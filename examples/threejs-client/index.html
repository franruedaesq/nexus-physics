<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Physics – Three.js Demo</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0a0a0f;
        overflow: hidden;
        font-family: monospace;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        color: #7fffb2;
        font-size: 13px;
        line-height: 1.6;
        text-shadow: 0 0 8px #00ff6688;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="fps">FPS: —</div>
      <div id="bodies">Bodies: —</div>
      <div id="info">nexus-physics · zero-copy Float32Array bridge</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
